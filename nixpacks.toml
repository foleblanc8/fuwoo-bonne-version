[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "gcc"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "python3 manage.py migrate --noinput && python3 manage.py collectstatic --noinput && gunicorn backend.wsgi --workers 2 --threads 4 --bind 0.0.0.0:$PORT"
