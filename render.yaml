services:
  - type: web
    name: coupdemain-api
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: gunicorn backend.wsgi --workers 2 --threads 4 --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: coupdemain-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "coupdemain-api.onrender.com"

databases:
  - name: coupdemain-db
    databaseName: coupdemain
    user: coupdemain
